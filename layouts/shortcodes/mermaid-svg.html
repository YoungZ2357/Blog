{{ $hash := .Get "hash" }}
<figure class="mermaid-figure">
  <img class="mermaid-img mermaid-light" src="{{ "/mermaid-svg/" | relURL }}{{ $hash }}-light.svg" alt="Mermaid diagram" loading="lazy">
  <img class="mermaid-img mermaid-dark"  src="{{ "/mermaid-svg/" | relURL }}{{ $hash }}-dark.svg"  alt="Mermaid diagram" loading="lazy">
</figure>
